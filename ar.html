<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AR Scene — Feature Marker Tracking</title>

  <!-- A-Frame + AR.js NFT build (supports colored image / natural feature tracking) -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent: #00e5ff;
      --accent2: #ff3d71;
      --bg: rgba(10,12,16,.85);
    }

    body { margin: 0; overflow: hidden; font-family: 'Share Tech Mono', monospace; }

    /* ── HUD overlay ── */
    #hud {
      position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: space-between;
      padding: .75rem 1.25rem;
      background: linear-gradient(180deg, rgba(0,0,0,.75) 0%, transparent 100%);
      pointer-events: none;
    }
    .hud-left { display: flex; flex-direction: column; gap: .2rem; }
    .hud-title { font-size: .85rem; color: #fff; letter-spacing: .12em; }
    .hud-sub   { font-size: .68rem; color: rgba(255,255,255,.4); letter-spacing: .1em; }

    /* ── Status badge ── */
    #statusBadge {
      font-size: .72rem; letter-spacing: .1em; padding: .35rem .9rem;
      border-radius: 20px; border: 1px solid var(--accent2); color: var(--accent2);
      background: rgba(255,61,113,.1); transition: .4s;
      pointer-events: none;
    }
    #statusBadge.found {
      border-color: var(--accent); color: var(--accent); background: rgba(0,229,255,.1);
    }

    /* ── Scanning animation ── */
    #scanLine {
      position: fixed; left: 0; right: 0; height: 2px; z-index: 9998;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      box-shadow: 0 0 10px var(--accent);
      animation: scan 3s linear infinite;
      opacity: .6;
      pointer-events: none;
    }
    #scanLine.hidden { display: none; }
    @keyframes scan { from { top: 0% } to { top: 100% } }

    /* ── Corner brackets ── */
    .corner-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      z-index: 9997; pointer-events: none;
    }
    .corner {
      position: absolute; width: 28px; height: 28px;
      border-color: var(--accent); border-style: solid; opacity: .7;
    }
    .corner.tl { top: 16px; left: 16px; border-width: 2px 0 0 2px; }
    .corner.tr { top: 16px; right: 16px; border-width: 2px 2px 0 0; }
    .corner.bl { bottom: 16px; left: 16px; border-width: 0 0 2px 2px; }
    .corner.br { bottom: 16px; right: 16px; border-width: 0 2px 2px 0; }

    /* ── Info panel ── */
    #infoPanel {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      z-index: 9999; background: var(--bg); border: 1px solid rgba(0,229,255,.25);
      border-radius: 8px; padding: .75rem 1.5rem; font-size: .72rem; color: rgba(255,255,255,.5);
      letter-spacing: .08em; text-align: center; pointer-events: none;
      backdrop-filter: blur(8px);
    }
    #infoPanel span { color: var(--accent); }

    /* ── Back button ── */
    #backBtn {
      position: fixed; bottom: 1.5rem; left: 1.5rem; z-index: 9999;
      font-family: 'Share Tech Mono', monospace; font-size: .72rem; letter-spacing: .1em;
      padding: .5rem 1rem; border: 1px solid rgba(255,255,255,.2);
      background: rgba(0,0,0,.5); color: rgba(255,255,255,.6); border-radius: 4px;
      cursor: pointer; text-decoration: none; backdrop-filter: blur(4px);
    }
    #backBtn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Loading screen ── */
    #loading {
      position: fixed; inset: 0; z-index: 99999;
      background: #0a0c10; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1.5rem;
    }
    .load-title { color: #fff; font-size: 1.1rem; letter-spacing: .15em; }
    .load-sub   { color: rgba(255,255,255,.35); font-size: .72rem; letter-spacing: .1em; }
    .spinner {
      width: 40px; height: 40px; border: 2px solid rgba(0,229,255,.15);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading.hidden { display: none; }
  </style>
</head>
<body>

  <!-- Loading screen -->
  <div id="loading">
    <div class="spinner"></div>
    <div class="load-title">INITIALIZING AR</div>
    <div class="load-sub">Accessing camera and loading NFT descriptors...</div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-left">
      <div class="hud-title">FEATURE-BASED AR TRACKER</div>
      <div class="hud-sub">NATURAL FEATURE TRACKING · NFT MODE</div>
    </div>
    <div id="statusBadge">SCANNING</div>
  </div>

  <!-- Scan line -->
  <div id="scanLine"></div>

  <!-- Corner brackets -->
  <div class="corner-overlay">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </div>

  <!-- Info panel -->
  <div id="infoPanel">
    Point camera at your <span>colored A4 marker</span> — keep it well-lit and flat
  </div>

  <!-- Back link -->
  <a href="index.html" id="backBtn">← GENERATOR</a>

  <!-- ════════════════════════════════════════════════════
       AR SCENE
       NFT descriptors: place marker.fset / marker.fset3 / marker.iset
       in the same folder and set url="marker" below.
       ════════════════════════════════════════════════════ -->
  <a-scene
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; precision: medium; antialias: true;"
    embedded
    arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
  >
    <!--
      url="marker" → points to marker.fset, marker.fset3, marker.iset
      Change "marker" to match your actual filename prefix.
      smooth / smoothCount / smoothTolerance reduce jitter.
    -->
    <a-nft
      type="nft"
      url="marker"
      smooth="true"
      smoothCount="10"
      smoothTolerance="0.01"
      smoothThreshold="5"
      emitevents="true"
      id="nftMarker"
    >
      <a-entity
        gltf-model="Pikachu.glb"
        position="0 0 0"
        scale="10 10 10"
        rotation="0 0 0"
      ></a-entity>
    </a-nft>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const badge     = document.getElementById('statusBadge');
    const scanLine  = document.getElementById('scanLine');
    const loading   = document.getElementById('loading');
    const infoPanel = document.getElementById('infoPanel');

    // Hide loading once scene initializes
    const scene = document.querySelector('a-scene');
    scene.addEventListener('loaded', () => {
      setTimeout(() => loading.classList.add('hidden'), 1200);
    });

    // Marker found / lost
    const marker = document.getElementById('nftMarker');

    marker.addEventListener('markerFound', () => {
      badge.textContent   = ' MARKER FOUND';
      badge.classList.add('found');
      scanLine.classList.add('hidden');
      infoPanel.innerHTML = 'Marker tracked — <span>3D object rendered</span>';
    });

    marker.addEventListener('markerLost', () => {
      badge.textContent   = 'SCANNING';
      badge.classList.remove('found');
      scanLine.classList.remove('hidden');
      infoPanel.innerHTML = 'Point camera at your <span>colored A4 marker</span> — keep it well-lit and flat';
    });
  </script>
</body>
</html>
